name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  package:
    name: Package and publish addon
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and publish
        uses: BigWigsMods/packager@v2
        with:
          args: ${{ github.event_name == 'workflow_dispatch' && '-d' || '' }}
        env:
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}

      - name: Find packaged zip
        if: github.event_name == 'workflow_dispatch'
        id: package-artifact
        shell: bash
        run: |
          archive_path="$(find . -path './.git' -prune -o -type f -name '*.zip' -print | head -n 1)"
          if [[ -z "$archive_path" ]]; then
            echo "No zip archive was created. Files under .release:"
            find .release -maxdepth 3 -type f -print || true
            exit 1
          fi
          echo "archive_path=$archive_path" >> "$GITHUB_OUTPUT"

      - name: Upload packaged zip artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ProspectMate-package
          path: ${{ steps.package-artifact.outputs.archive_path }}
          if-no-files-found: error
